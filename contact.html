<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me — Pittaya Samsalee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* เขียนสไตล์ฟอร์มเพิ่มเติมให้ออกมาหรูหราเข้ากับธีมหลัก */
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; color: #2C3E50; }
    .form-control { width: 100%; padding: 14px; border: 1px solid #D1DFEC; border-radius: 4px; background-color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; box-sizing: border-box; transition: all 0.3s ease; }
    .form-control:focus { outline: none; border-color: #075AAA; background-color: #FAF8F5; }
    .contact-container { display: flex; gap: 5px; flex-direction: column; }
    .contact-info-card { background: #FFFFFF; padding: 30px; border-radius: 8px; border: 1px solid #EBF3F9; margin-bottom: 30px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">PS</div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">HOME</a></li>
      <li><a href="projects.html" class="nav-link">EXPERIENCE</a></li>
      <li><a href="contact.html" class="nav-link active">CONTACT</a></li>
    </ul>
  </nav>

  <main>
    <h2>Contact Me</h2>
    
    <div class="contact-info-card">
  <p style="margin: 0 0 10px 0;"><strong>Phone:</strong> +44 7403 983785</p>
  <p style="margin: 0 0 10px 0;"><strong>Email:</strong> Pittaya.jackky@gmail.com</p>
  <p style="margin: 0;"><strong>Location:</strong> Basingstoke, United Kingdom</p>
</div>

      <div class="skill-card" style="margin-bottom: 60px;">
        <h3 style="margin-top: 0; margin-bottom: 25px; font-size: 1.8rem;">Send a Message</h3>
        <form>
          <div class="form-group">
            <label for="name">YOUR NAME</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label for="email">YOUR EMAIL ADDRESS</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email address">
          </div>
          <div class="form-group">
            <label for="message">YOUR MESSAGE</label>
            <textarea id="message" class="form-control" rows="5" placeholder="Write your message here..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; cursor: pointer;">SUBMIT MESSAGE</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Pittaya Samsalee. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
